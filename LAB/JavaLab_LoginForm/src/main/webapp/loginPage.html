<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LoginPage</title>
</head>
<body>
<form method="POST" action="./LoginServlet"> 
    <!-- POST method is for personalization hidden data -->
	<!-- . is for current directory.. hence browser replaces the current folder path in it -->
		USERNAME : <input type="text" name="username" placeholder="UserName : " required><br><br>
		
		PASSWORD : <input type="password" name="password" placeholder="Enter Password : " required><br><br>
	<!-- same name should be given in servlet too -->
		<button type="submit" color="green" >Login</button><br>
	</form>
	
</body>
</html>
